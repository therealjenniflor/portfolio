<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>New User — Multi-Location Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4338ca;
    --accent-soft: #eef2ff;
    --accent-strong: #3730a3;
    --focus-ring: rgba(67, 56, 202, 0.18);
    --ink: #0f172a;
    --ink-2: #1f2937;
    --muted: #6b7280;
    --muted-2: #9ca3af;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --bg: #f3f4f6;
    --panel: #ffffff;
    --hover: #f8fafc;
    --hover-2: #f1f5f9;
    --danger: #dc2626;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-modal: 0 30px 60px -20px rgba(15, 23, 42, 0.22), 0 8px 24px -8px rgba(15, 23, 42, 0.14);
    --shadow-pop: 0 12px 32px -8px rgba(15, 23, 42, 0.18), 0 2px 8px rgba(15, 23, 42, 0.06);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.45;
  }

  /* page chrome behind modal (soft faux app) */
  .page {
    min-height: 100vh;
    position: relative;
    overflow: visible;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 24px 120px;
  }
  .page-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, #f8fafc 0%, #eef0f4 100%);
    z-index: 0;
  }
  .page-bg::before,
  .page-bg::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
  }
  .page-bg::before {
    width: 480px; height: 480px;
    background: radial-gradient(circle, #c7d2fe 0%, transparent 70%);
    top: -120px; left: -120px;
  }
  .page-bg::after {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #e0e7ff 0%, transparent 70%);
    bottom: -160px; right: -140px;
  }
  .breadcrumb {
    position: absolute;
    top: 16px; left: 24px;
    font-size: 11px;
    color: var(--muted);
    z-index: 1;
    letter-spacing: 0.01em;
  }
  .breadcrumb b { color: var(--ink-2); font-weight: 600; }

  /* backdrop dim for modal effect */
  .backdrop {
    position: absolute; inset: 0;
    background: rgba(15, 23, 42, 0.28);
    backdrop-filter: blur(2px);
    z-index: 1;
  }

  /* modal */
  .modal {
    position: relative;
    width: 720px;
    max-width: calc(100vw - 32px);
    background: var(--panel);
    border-radius: 12px;
    box-shadow: var(--shadow-modal);
    z-index: 2;
    overflow: visible;
    display: flex;
    flex-direction: column;
  }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .icon-btn {
    width: 32px; height: 32px;
    border: none; background: transparent;
    border-radius: 8px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background 120ms, color 120ms;
  }
  .icon-btn:hover { background: var(--hover); color: var(--ink); }

  .modal-body {
    padding: 24px 28px 8px;
    overflow: visible;
  }

  .section {
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section:last-of-type { border-bottom: none; }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    margin: 4px 0 18px;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  .row { display: grid; gap: 16px; margin-bottom: 14px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  .row.triple-with-trash {
    grid-template-columns: 1fr 1fr 1fr auto;
    align-items: end;
  }
  .row.triple { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .req { color: var(--danger); font-weight: 700; }

  .input, .select {
    width: 100%;
    height: 38px;
    border: 1px solid var(--border-strong);
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .input::placeholder { color: var(--muted-2); }
  .input:hover:not(:disabled), .select:hover { border-color: var(--muted-2); }
  .input:focus, .select.open, .select:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }

  /* select button */
  .select {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    text-align: left;
    position: relative;
  }
  .select .val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .select .val.placeholder { color: var(--muted-2); }
  .select .caret {
    color: var(--accent);
    display: inline-flex;
    transition: transform 150ms;
  }
  .select.open .caret { transform: rotate(180deg); }

  .chips { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 6px 2px 8px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
  }
  .chip .x {
    width: 14px; height: 14px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--accent-strong);
    opacity: 0.6;
    transition: opacity 120ms, background 120ms;
  }
  .chip .x:hover { opacity: 1; background: rgba(67, 56, 202, 0.12); }

  /* popover */
  .pop {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-pop);
    z-index: 10;
    overflow: hidden;
    animation: pop-in 120ms ease-out;
    max-height: 260px;
    overflow-y: auto;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .pop-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 100ms;
    font-size: 13.5px;
  }
  .pop-item:hover { background: var(--hover-2); }
  .pop-item.active { background: var(--accent-soft); }
  .pop-item .check {
    width: 16px; height: 16px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }
  .pop-item .desc { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.35; }
  .pop-item .label-text { font-weight: 500; }
  .pop-item.placeholder { color: var(--muted-2); font-style: italic; }

  /* checkbox items (Account Type) */
  .pop-check {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1.5px solid var(--border-strong);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    background: #fff;
    transition: background 100ms, border-color 100ms;
  }
  .pop-check.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* account row group */
  .account-card {
    position: relative;
    margin-bottom: 14px;
  }
  .account-card .account-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 10px;
  }
  .trash {
    width: 38px;
    height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    border: none; background: transparent;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    transition: color 120ms, background 120ms;
  }
  .trash:hover { color: var(--danger); background: #fef2f2; }
  .trash:disabled { opacity: 0.3; cursor: not-allowed; }

  .footer-add {
    margin-top: 6px;
  }
  .btn-add-account {
    width: 100%;
    height: 40px;
    border: 1px dashed var(--border-strong);
    background: #fff;
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: inherit;
    font-size: 13.5px;
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 12px;
    gap: 8px;
    cursor: pointer;
    transition: all 120ms;
  }
  .btn-add-account:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #fafbff;
  }
  .btn-add-account .plus {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* modal footer */
  .modal-foot {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: #fff;
    border-radius: 0 0 12px 12px;
  }
  .btn {
    height: 38px;
    padding: 0 20px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 140ms;
  }
  .btn-text {
    background: transparent;
    color: var(--ink-2);
    padding: 0 10px;
  }
  .btn-text:hover { color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 10px -4px rgba(67, 56, 202, 0.5);
  }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-primary:disabled {
    background: #c7d2fe;
    box-shadow: none;
    cursor: not-allowed;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: transform 220ms, opacity 220ms;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 12px 28px -10px rgba(0,0,0,0.4);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #34d399;
  }

  /* tweaks panel */
  .tweaks {
    position: fixed;
    bottom: 20px; right: 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-pop);
    padding: 16px;
    width: 260px;
    z-index: 50;
    display: none;
    font-size: 12px;
  }
  .tweaks.open { display: block; }
  .tweaks h4 {
    margin: 0 0 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .tweaks .tweak-row { margin-bottom: 12px; }
  .tweaks .tweak-row:last-child { margin-bottom: 0; }
  .tweaks label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--ink-2); }
  .swatches { display: flex; gap: 8px; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 120ms, border-color 120ms;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { border-color: var(--ink); }

  .empty-hint {
    font-size: 12px;
    color: var(--muted-2);
    padding: 8px 0 2px;
    font-style: italic;
  }

  /* hidden invisible helper */
  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="page">
  <div class="page-bg"></div>
  <div class="breadcrumb"><b>New Users Modal:</b> Establishment › Choose location</div>
  <div class="backdrop"></div>
  <div id="app"></div>
</div>

<div class="toast" id="toast"><span class="dot"></span><span id="toast-msg">User saved</span></div>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <label>Accent</label>
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="tweak-row">
    <label>Density</label>
    <div class="swatches" style="gap:4px">
      <button class="swatch" data-density="compact" style="background:#fff;color:var(--ink);width:auto;height:28px;border-radius:6px;border:1px solid var(--border);padding:0 10px;font-size:11px;font-weight:600">Compact</button>
      <button class="swatch" data-density="comfortable" style="background:#fff;color:var(--ink);width:auto;height:28px;border-radius:6px;border:1px solid var(--border);padding:0 10px;font-size:11px;font-weight:600">Comfy</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/new-user-modal-app.jsx"></script>

<script>
  // Tweaks panel wiring
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#4338ca",
    "density": "compact"
  }/*EDITMODE-END*/;

  const ACCENTS = [
    { name: 'Indigo', val: '#4338ca', strong: '#3730a3', soft: '#eef2ff' },
    { name: 'Violet', val: '#7c3aed', strong: '#6d28d9', soft: '#f3e8ff' },
    { name: 'Blue',   val: '#2563eb', strong: '#1d4ed8', soft: '#eff6ff' },
    { name: 'Teal',   val: '#0d9488', strong: '#0f766e', soft: '#ccfbf1' },
    { name: 'Rose',   val: '#e11d48', strong: '#be123c', soft: '#ffe4e6' },
  ];

  function applyAccent(hex) {
    const match = ACCENTS.find(a => a.val.toLowerCase() === hex.toLowerCase()) || ACCENTS[0];
    document.documentElement.style.setProperty('--accent', match.val);
    document.documentElement.style.setProperty('--accent-strong', match.strong);
    document.documentElement.style.setProperty('--accent-soft', match.soft);
    // focus ring based on accent
    const r = parseInt(match.val.slice(1,3),16), g = parseInt(match.val.slice(3,5),16), b = parseInt(match.val.slice(5,7),16);
    document.documentElement.style.setProperty('--focus-ring', `rgba(${r},${g},${b},0.18)`);
    document.querySelectorAll('#swatches .swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.val.toLowerCase() === match.val.toLowerCase());
    });
  }

  function applyDensity(d) {
    document.documentElement.style.setProperty('--pad', d === 'compact' ? '24px 28px' : '32px 36px');
    document.documentElement.dataset.density = d;
    document.querySelectorAll('[data-density]').forEach(b => {
      b.style.background = b.dataset.density === d ? 'var(--accent-soft)' : '#fff';
      b.style.color = b.dataset.density === d ? 'var(--accent-strong)' : 'var(--ink)';
      b.style.borderColor = b.dataset.density === d ? 'var(--accent)' : 'var(--border)';
    });
  }

  // Populate swatches
  const swWrap = document.getElementById('swatches');
  ACCENTS.forEach(a => {
    const b = document.createElement('button');
    b.className = 'swatch';
    b.dataset.val = a.val;
    b.style.background = a.val;
    b.title = a.name;
    b.addEventListener('click', () => {
      applyAccent(a.val);
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent: a.val}}, '*');
    });
    swWrap.appendChild(b);
  });
  document.querySelectorAll('[data-density]').forEach(b => {
    b.addEventListener('click', () => {
      applyDensity(b.dataset.density);
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{density: b.dataset.density}}, '*');
    });
  });

  applyAccent(TWEAK_DEFAULTS.accent);
  applyDensity(TWEAK_DEFAULTS.density);

  // Tweaks protocol
  window.addEventListener('message', (e) => {
    const msg = e.data || {};
    if (msg.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
    if (msg.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
  });
  window.parent.postMessage({type:'__edit_mode_available'}, '*');

  // Toast helper
  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  };
</script>

</body>
</html>
